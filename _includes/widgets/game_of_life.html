<div class="row mt-3">
    <div class="col">
        <div class="card border-0 shadow-sm bg-white">
            <div class="card-body p-4">
                <h6>
                    <i class="fas fa-gamepad"></i> &nbsp;
                    <span class="lang-en">Bored?</span><span class="lang-zh">Tu t'ennuies ?</span>
                </h6>

                <!-- mode switch -->
                <div class="btn-group btn-group-sm mb-3" role="group">
                    <button id="gol-mode-life" type="button" class="btn btn-outline-dark active">
                        <i class="fas fa-border-all"></i> <span class="lang-en">Game of Life</span><span class="lang-zh">Jeu de la vie</span>
                    </button>
                    <button id="gol-mode-fire" type="button" class="btn btn-outline-dark">
                        <i class="fas fa-fire"></i> <span class="lang-en">Forest fire</span><span class="lang-zh">Feu de forêt</span>
                    </button>
                </div>

                <!-- shared transport controls -->
                <div class="d-flex flex-wrap mb-2" style="gap:.4rem;">
                    <button id="gol-play" class="btn btn-sm btn-dark">
                        <i class="fas fa-play"></i> <span class="lang-en">Play</span><span class="lang-zh">Lancer</span>
                    </button>
                    <button id="gol-step" class="btn btn-sm btn-outline-dark">
                        <i class="fas fa-step-forward"></i> <span class="lang-en">Step</span><span class="lang-zh">Pas</span>
                    </button>
                    <button id="gol-random" class="btn btn-sm btn-outline-dark">
                        <i class="fas fa-dice"></i> <span class="lang-en">Random</span><span class="lang-zh">Aléatoire</span>
                    </button>
                    <button id="gol-clear" class="btn btn-sm btn-outline-dark">
                        <i class="fas fa-trash"></i> <span class="lang-en">Clear</span><span class="lang-zh">Effacer</span>
                    </button>
                </div>

                <!-- Game of Life: pattern palette -->
                <div id="gol-life-controls" class="mb-3">
                  <div class="d-flex flex-wrap align-items-center" style="gap:.4rem;">
                    <span class="small text-muted mr-1">
                        <span class="lang-en">Patterns:</span><span class="lang-zh">Formes&nbsp;:</span>
                    </span>
                    <button data-gol-pattern="" class="btn btn-sm btn-outline-secondary active">
                        <i class="fas fa-pen"></i> <span class="lang-en">Pen</span><span class="lang-zh">Stylo</span>
                    </button>
                    <button data-gol-pattern="glider" class="btn btn-sm btn-outline-secondary">Glider</button>
                    <button data-gol-pattern="lwss" class="btn btn-sm btn-outline-secondary">LWSS</button>
                    <button data-gol-pattern="mwss" class="btn btn-sm btn-outline-secondary">MWSS</button>
                    <button data-gol-pattern="blinker" class="btn btn-sm btn-outline-secondary">Blinker</button>
                    <button data-gol-pattern="toad" class="btn btn-sm btn-outline-secondary">Toad</button>
                    <button data-gol-pattern="beacon" class="btn btn-sm btn-outline-secondary">Beacon</button>
                    <button data-gol-pattern="block" class="btn btn-sm btn-outline-secondary">Block</button>
                    <button data-gol-pattern="beehive" class="btn btn-sm btn-outline-secondary">Beehive</button>
                    <button data-gol-pattern="loaf" class="btn btn-sm btn-outline-secondary">Loaf</button>
                    <button data-gol-pattern="pulsar" class="btn btn-sm btn-outline-secondary">Pulsar</button>
                    <button data-gol-pattern="pentadecathlon" class="btn btn-sm btn-outline-secondary">Pentadecathlon</button>
                    <button data-gol-pattern="rpentomino" class="btn btn-sm btn-outline-secondary">R-pentomino</button>
                    <button data-gol-pattern="acorn" class="btn btn-sm btn-outline-secondary">Acorn</button>
                    <button data-gol-pattern="diehard" class="btn btn-sm btn-outline-secondary">Diehard</button>
                    <button data-gol-pattern="gun" class="btn btn-sm btn-outline-secondary">
                        <span class="lang-en">Glider gun</span><span class="lang-zh">Canon à planeurs</span>
                    </button>
                  </div>
                </div>

                <!-- Forest fire: paint mode + parameters -->
                <div id="gol-fire-controls" class="d-none mb-3">
                    <div class="d-flex flex-wrap align-items-center mb-2" style="gap:.4rem;">
                        <span class="small text-muted mr-1">
                            <span class="lang-en">Brush:</span><span class="lang-zh">Pinceau&nbsp;:</span>
                        </span>
                        <button data-gol-fire="plant" class="btn btn-sm btn-outline-success active">
                            <i class="fas fa-tree"></i> <span class="lang-en">Plant trees</span><span class="lang-zh">Planter</span>
                        </button>
                        <button data-gol-fire="ignite" class="btn btn-sm btn-outline-danger">
                            <i class="fas fa-fire"></i> <span class="lang-en">Ignite</span><span class="lang-zh">Enflammer</span>
                        </button>
                    </div>
                    <div class="d-flex flex-wrap align-items-center" style="gap:1rem;">
                        <label class="small text-muted mb-0">
                            <span class="lang-en">Growth</span><span class="lang-zh">Croissance</span>
                            <input id="gol-growth" type="range" min="0" max="100" value="30" style="vertical-align:middle; width:110px;">
                        </label>
                        <label class="small text-muted mb-0">
                            <span class="lang-en">Lightning</span><span class="lang-zh">Foudre</span>
                            <input id="gol-light" type="range" min="0" max="100" value="30" style="vertical-align:middle; width:110px;">
                        </label>
                    </div>
                </div>

                <div id="gol-wrap" style="width:100%; overflow-x:auto;">
                    <canvas id="gol-canvas" style="background:#fff; border-radius:4px; touch-action:none;"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ '/assets/js/game-of-life.js' | relative_url }}?v=4"></script>
