<!DOCTYPE html>
<html lang="en" class="lang-active-en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="google-site-verification" content="m5sSh23hfBna8Z26FSpuF8CZbxXyIUevnB4gykymYvo">
    <title>{{ page.navbar_name | default: page.title }} - {{ site.data.profile.navbar_name }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}Nicolas Cayuela, PhD student at Institut Jean Lamour (Nancy, UMR CNRS 7198). Research on elastic metamaterials, phononic crystals and graph deep learning (GNN) for inverse design.{% endif %}">
    <link rel="canonical" href="https://nicolascayuela.github.io{{ page.url | replace: 'index.html', '' }}">
    <meta property="og:title" content="{{ page.navbar_name | default: page.title }} - Nicolas Cayuela">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}PhD student in phononics and metamaterials at Institut Jean Lamour - elastic metamaterials, phononic crystals, GNN inverse design.{% endif %}">
    <meta property="og:url" content="https://nicolascayuela.github.io{{ page.url | replace: 'index.html', '' }}">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://nicolascayuela.github.io/assets/images/photos/profile.jpg">
    <meta property="og:locale" content="en_US">
    <meta property="og:locale:alternate" content="fr_FR">

    <!-- Structured data: consolidates the "person" entity for search engines -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Nicolas Cayuela",
      "url": "https://nicolascayuela.github.io/",
      "jobTitle": "PhD Student in Phononics & Metamaterials",
      "affiliation": {
        "@type": "Organization",
        "name": "Institut Jean Lamour, UMR CNRS 7198",
        "url": "https://ijl.univ-lorraine.fr/"
      },
      "knowsAbout": ["Phononics", "Elastic metamaterials", "Phononic crystals",
                     "Machine learning", "Graph neural networks", "Inverse design"],
      "sameAs": [
        "https://github.com/{{ site.data.profile.github }}",
        "https://www.linkedin.com/in/{{ site.data.profile.linkedin }}"
      ]
    }
    </script>

    <script>
        (function() {
            var lang = localStorage.getItem('site-lang') || 'en';
            var html = document.documentElement;
            html.className = html.className.replace(/lang-active-\w+/g, '').trim();
            html.classList.add('lang-active-' + lang);
            html.setAttribute('lang', lang === 'fr' ? 'fr' : 'en');
            if (localStorage.getItem('site-theme') === 'dark') {
                html.classList.add('theme-dark');
            }
        })();
    </script>

    <!-- Stylesheets -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/css/bootstrap.min.css" integrity="sha512-P5MgMn1jBN01asBgU0z60Qk4QxiXo86+wlFahKrsQf37c9cro517WzVSPPV1tDKzhku2iJ2FVgL67wG03SGnNA==" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" integrity="sha512-+4zCK9k+qNFUR5X+cKL9EIR+ZOhtIloNl9GIKS57V1MyNsYpYcUrUeQc9vNfzsWfV28IaLL3i96P9sdNyeRssA==" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.1/css/academicons.min.css" integrity="sha512-b1ASx0WHgVFL5ZQhTgiPWX+68KjS38Jk87jg7pe+qC7q9YkEtFq0z7xCglv7qGIs/68d3mAp+StfC8WKC5SSAg==" crossorigin="anonymous" />
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lato-font/3.0.0/css/lato-font.min.css"> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Raleway:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/global.css?v=9">
    <!-- ICON -->
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/etc/favicon-32.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="128x128" href="{{ '/assets/images/etc/favicon.png' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/assets/images/etc/favicon.png' | relative_url }}">

    <!-- Quote CSS-->
    <style>
        blockquote {
            font-style: italic;
            color: #555;
            border-left: 10px solid #3498db;
            background: #ecf5fc;
            padding: 15px 20px;
            margin: 20px 0;
            max-width: 920px;
            width: 100%;
            position: relative;
            quotes: "“" "”" "‘" "’";
        }
        blockquote:before {
            color: #3498db;
            content: open-quote;
            font-size: 2em;
            position: absolute;
            left: 10px;
            top: 10px;
        }
        blockquote:after {
            color: #3498db;
            content: close-quote;
            font-size: 2em;
            position: absolute;
            right: 10px;
            bottom: 10px;
        }
    </style>
</head>

    <script src="assets/js/common.js"></script>
